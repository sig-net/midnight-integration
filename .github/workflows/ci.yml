# This runs all of the unit and integration testing in this repository.
#
#   unit         — yarn compile && yarn build && yarn test  (every push/PR)
#   integration  — docker compose up -d + the generic signet-caller e2e; the
#                  suite's own setup deploys the contracts, appends the
#                  fakenet hand-off values to .env and starts the responder
#                  container
#
# Everything is FROZEN, not floating:
#   - npm deps come from the committed yarn.lock; installs run --immutable, so
#     CI fails rather than silently resolving a newer version. Bump versions
#     explicitly (edit package.json, refresh the lockfile, commit).
#   - the compact toolchain is pinned: launcher compact-v0.5.1 and compiler
#     compactc 0.33.0-rc.2, both by exact URL. Bump the pins deliberately.
#
# Caches are keyed on those pinned versions; a hit only skips a download or
# keygen, it never changes what is built:
#   compact-*  — the compact toolchain (~/.compact + the launcher binary)
#   zk-keys-*  — prover/verifier keys, keyed on compiler version + every
#                .compact source; a hit lets the setup skip ~2×10 min of
#                keygen via TRUST_PREBUILT_ZK_KEYS (the key changes whenever a
#                contract or the compiler changes). Only the integration job
#                SAVES this cache (it generates both contracts' keys); the
#                unit job restores read-only.
#
# The integration job pulls ghcr.io/sig-net/fakenet — that image must be
# public.

name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 * * *" # nightly: integration suite
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  unit:
    name: compile (skip-zk) → build → unit tests
    if: github.event_name != 'schedule' || github.event.schedule == '17 3 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          # corepack owns yarn here; the action's cache probe would run
          # yarn 1.x against the yarn-4 packageManager field and die
          package-manager-cache: false
      - name: Enable corepack (yarn 4 via the packageManager field)
        run: corepack enable
      - name: Restore the compact toolchain (keyed on the pinned versions)
        uses: actions/cache@v4
        with:
          path: |
            ~/.compact
            ~/.local/bin/compact
          key: compact-${{ runner.os }}-launcher0.5.1-compactc0.33.0-rc.2
      - name: Install the compact toolchain (pinned launcher + compiler, per AGENTS.md)
        run: |
          export PATH="$HOME/.local/bin:$HOME/.compact/bin:$PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.compact/bin" >> "$GITHUB_PATH"
          # Launcher pinned to compact-v0.5.1 (never releases/latest): the
          # toolchain is frozen, so bump this tag deliberately.
          if ! command -v compact >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -LsSf \
              https://github.com/midnightntwrk/compact/releases/download/compact-v0.5.1/compact-installer.sh | sh
          fi
          # The workspace tracks the ledger-9 toolchain line: compactc
          # 0.33.0-rc.2 is a PRERELEASE published on the toolchain's LF home
          # (LFDT-Minokawa/compact), which the launcher's channel does not
          # list — download it directly and let the launcher adopt it. Part
          # of the ledger-9 MATCHED SET (see docker-compose.yaml's image-tag
          # comment) — bump it together with the npm stack.
          RC_DIR="$HOME/.compact/versions/0.33.0-rc.2/x86_64-unknown-linux-musl"
          if [ ! -x "$RC_DIR/compactc" ]; then
            mkdir -p "$RC_DIR"
            curl -fsSL -o /tmp/compactc-rc.zip \
              https://github.com/LFDT-Minokawa/compact/releases/download/compactc-v0.33.0-rc.2/compactc_v0.33.0-rc.2_x86_64-unknown-linux-musl.zip
            unzip -qo /tmp/compactc-rc.zip -d "$RC_DIR"
            chmod +x "$RC_DIR"/*
          fi
          # `compact update <ver>` adopts an already-on-disk version without
          # downloading; if the launcher refuses (version not in its
          # channel), wire the default symlinks it would have created.
          compact update 0.33.0-rc.2 || ln -sfn "$RC_DIR"/* "$HOME/.compact/bin/"
          compact compile --version
      - name: Read the compact compiler version (part of the zk cache key)
        id: compact
        run: |
          # The zk-key cache must bust whenever the compiler BUILD changes,
          # but `compact compile --version` drops the -rc suffix (rc.0 and
          # rc.2 both print 0.33.0), so an rc bump would silently reuse the
          # old rc's cached managed/ output against a newer runtime. Read the
          # rc-qualified version from the default compiler's version directory
          # (…/versions/<version>/<arch>/compactc) instead.
          target="$(readlink -f "$(command -v compactc)")"
          version="$(basename "$(dirname "$(dirname "$target")")")"
          case "$version" in [0-9]*) ;; *) version="$(compact compile --version)" ;; esac
          echo "version=$(printf '%s' "$version" | tr -cd '[:alnum:]._-')" >> "$GITHUB_OUTPUT"
      - name: Install dependencies (frozen — the committed yarn.lock is authoritative)
        run: yarn install --immutable
      - name: Compile (skip-zk)
        run: yarn compile
      - name: Restore prebuilt zk proving keys (read-only; the integration job saves)
        uses: actions/cache/restore@v4
        with:
          path: |
            packages/signet-contract/src/managed
            packages/caller-contract/src/managed
          key: zk-keys-${{ runner.os }}-${{ steps.compact.outputs.version }}-${{ hashFiles('packages/*/src/*.compact') }}
      - name: Ensure signet-contract prover keys (its build's publish-safety check needs them)
        run: |
          if ls packages/signet-contract/src/managed/keys/*.prover >/dev/null 2>&1; then
            echo "prover keys present (restored from the cache) — skipping keygen"
          else
            yarn compile:signet-contract:zk
          fi
      - name: Build (typecheck, no emit)
        run: yarn build
      - name: Unit tests (simulator-only; the integration suites self-skip without RUN_INTEGRATION_TESTS)
        run: yarn test

  integration:
    name: integration (compose stack + fakenet + signet-caller e2e)
    if: github.event_name != 'schedule' || github.event.schedule == '17 3 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          # corepack owns yarn here; the action's cache probe would run
          # yarn 1.x against the yarn-4 packageManager field and die
          package-manager-cache: false
      - name: Enable corepack (yarn 4 via the packageManager field)
        run: corepack enable
      - name: Restore the compact toolchain (keyed on the pinned versions)
        uses: actions/cache@v4
        with:
          path: |
            ~/.compact
            ~/.local/bin/compact
          key: compact-${{ runner.os }}-launcher0.5.1-compactc0.33.0-rc.2
      - name: Install the compact toolchain (pinned launcher + compiler, per AGENTS.md)
        run: |
          export PATH="$HOME/.local/bin:$HOME/.compact/bin:$PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.compact/bin" >> "$GITHUB_PATH"
          # Launcher pinned to compact-v0.5.1 (never releases/latest): the
          # toolchain is frozen, so bump this tag deliberately.
          if ! command -v compact >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -LsSf \
              https://github.com/midnightntwrk/compact/releases/download/compact-v0.5.1/compact-installer.sh | sh
          fi
          # The workspace tracks the ledger-9 toolchain line: compactc
          # 0.33.0-rc.2 is a PRERELEASE published on the toolchain's LF home
          # (LFDT-Minokawa/compact), which the launcher's channel does not
          # list — download it directly and let the launcher adopt it. Part
          # of the ledger-9 MATCHED SET (see docker-compose.yaml's image-tag
          # comment) — bump it together with the npm stack.
          RC_DIR="$HOME/.compact/versions/0.33.0-rc.2/x86_64-unknown-linux-musl"
          if [ ! -x "$RC_DIR/compactc" ]; then
            mkdir -p "$RC_DIR"
            curl -fsSL -o /tmp/compactc-rc.zip \
              https://github.com/LFDT-Minokawa/compact/releases/download/compactc-v0.33.0-rc.2/compactc_v0.33.0-rc.2_x86_64-unknown-linux-musl.zip
            unzip -qo /tmp/compactc-rc.zip -d "$RC_DIR"
            chmod +x "$RC_DIR"/*
          fi
          # `compact update <ver>` adopts an already-on-disk version without
          # downloading; if the launcher refuses (version not in its
          # channel), wire the default symlinks it would have created.
          compact update 0.33.0-rc.2 || ln -sfn "$RC_DIR"/* "$HOME/.compact/bin/"
          compact compile --version
      - name: Read the compact compiler version (part of the zk cache key)
        id: compact
        run: |
          # The zk-key cache must bust whenever the compiler BUILD changes,
          # but `compact compile --version` drops the -rc suffix (rc.0 and
          # rc.2 both print 0.33.0), so an rc bump would silently reuse the
          # old rc's cached managed/ output against a newer runtime. Read the
          # rc-qualified version from the default compiler's version directory
          # (…/versions/<version>/<arch>/compactc) instead.
          target="$(readlink -f "$(command -v compactc)")"
          version="$(basename "$(dirname "$(dirname "$target")")")"
          case "$version" in [0-9]*) ;; *) version="$(compact compile --version)" ;; esac
          echo "version=$(printf '%s' "$version" | tr -cd '[:alnum:]._-')" >> "$GITHUB_OUTPUT"
      - name: Install dependencies (frozen — the committed yarn.lock is authoritative)
        run: yarn install --immutable
      - name: Compile (skip-zk)
        run: yarn compile
      - name: Restore prebuilt zk proving keys
        id: zk
        uses: actions/cache/restore@v4
        with:
          path: |
            packages/signet-contract/src/managed
            packages/caller-contract/src/managed
          key: zk-keys-${{ runner.os }}-${{ steps.compact.outputs.version }}-${{ hashFiles('packages/*/src/*.compact') }}
      - name: zk keygen (both contracts; cache miss only)
        if: steps.zk.outputs.cache-hit != 'true'
        run: yarn compile:zk
      - name: Save zk proving keys (immediately — a later flow failure must not lose them)
        if: steps.zk.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            packages/signet-contract/src/managed
            packages/caller-contract/src/managed
          key: zk-keys-${{ runner.os }}-${{ steps.compact.outputs.version }}-${{ hashFiles('packages/*/src/*.compact') }}
      - name: Start the local stack (midnight node, indexer, proof server, anvil)
        run: docker compose up -d
      - name: Wait for the stack
        run: |
          timeout 180 bash -c 'until curl -fsS http://127.0.0.1:9944/health >/dev/null 2>&1; do sleep 3; done'
          timeout 60 bash -c 'until curl -s -o /dev/null http://127.0.0.1:6300; do sleep 3; done'
          timeout 180 bash -c 'until curl -fs -X POST -H "content-type: application/json" -d "{\"query\":\"{__typename}\"}" http://127.0.0.1:8088/api/v3/graphql >/dev/null 2>&1; do sleep 3; done'
          curl -fsS -X POST -H 'content-type: application/json' \
            -d '{"jsonrpc":"2.0","id":1,"method":"eth_chainId","params":[]}' http://127.0.0.1:8545
      # The suite's own setup does the rest: deploys both contracts, appends
      # MPC_ROOT_KEY + MIDNIGHT_SIGNET_CONTRACT_ADDRESS to .env (the file
      # does not exist on a fresh runner — it gets created), and starts the
      # fakenet responder container. The pipeline itself is EVM-free; anvil
      # is up only because the responder's config needs a reachable EVM
      # endpoint to boot.
      - name: Integration suite — generic signet-caller e2e
        env:
          TRUST_PREBUILT_ZK_KEYS: "1"
        run: yarn test:integration-tests
      - name: Collect service logs
        if: failure()
        run: |
          mkdir -p ci-logs
          docker compose --profile fakenet logs --no-color > ci-logs/compose.log 2>&1 || true
          docker ps -a > ci-logs/docker-ps.txt 2>&1 || true
      - name: Upload service logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs
          path: ci-logs/
