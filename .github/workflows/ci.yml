# Unit and integration testing.
#   unit         compile + build + test
#   integration  compose stack + signet-caller e2e, whose setup deploys the
#                contracts and starts the fakenet responder
#
# Everything is FROZEN: npm deps from the committed yarn.lock (installs run
# --immutable), and the compact toolchain pinned by exact URL (launcher
# compact-v0.5.1, compiler compactc 0.33.0-rc.2). Bump versions deliberately.
#
# Caches (compact-*, zk-keys-*) are keyed on those pins, so a hit only skips a
# download/keygen and never changes what is built. Only the integration job
# saves zk-keys, while the unit job restores read-only. It also pulls the
# public ghcr.io/sig-net/fakenet image.

name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 * * *" # nightly: integration suite
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  unit:
    name: compile (skip-zk) → build → unit tests
    if: github.event_name != 'schedule' || github.event.schedule == '17 3 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          # corepack owns yarn: the action's yarn-1 cache probe would die here
          package-manager-cache: false
      - name: Enable corepack (yarn 4 via the packageManager field)
        run: corepack enable
      - name: Restore the compact toolchain (keyed on the pinned versions)
        uses: actions/cache@v4
        with:
          path: |
            ~/.compact
            ~/.local/bin/compact
          key: compact-${{ runner.os }}-launcher0.5.1-compactc0.33.0-rc.2
      - name: Install the compact toolchain (pinned launcher + compiler, per AGENTS.md)
        run: |
          export PATH="$HOME/.local/bin:$HOME/.compact/bin:$PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.compact/bin" >> "$GITHUB_PATH"
          # Launcher pinned to compact-v0.5.1 (never releases/latest).
          if ! command -v compact >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -LsSf \
              https://github.com/midnightntwrk/compact/releases/download/compact-v0.5.1/compact-installer.sh | sh
          fi
          # compactc 0.33.0-rc.2: a ledger-9 PRERELEASE not in the launcher's
          # channel, so fetch it directly. Part of the ledger-9 matched set
          # (see docker-compose.yaml). Bump it with the npm stack.
          RC_DIR="$HOME/.compact/versions/0.33.0-rc.2/x86_64-unknown-linux-musl"
          if [ ! -x "$RC_DIR/compactc" ]; then
            mkdir -p "$RC_DIR"
            curl -fsSL -o /tmp/compactc-rc.zip \
              https://github.com/LFDT-Minokawa/compact/releases/download/compactc-v0.33.0-rc.2/compactc_v0.33.0-rc.2_x86_64-unknown-linux-musl.zip
            unzip -qo /tmp/compactc-rc.zip -d "$RC_DIR"
            chmod +x "$RC_DIR"/*
          fi
          # Adopt the on-disk version. If the launcher refuses, wire its symlinks.
          compact update 0.33.0-rc.2 || ln -sfn "$RC_DIR"/* "$HOME/.compact/bin/"
          compact compile --version
      - name: Read the compact compiler version (part of the zk cache key)
        id: compact
        run: |
          # `compact compile --version` drops the -rc suffix (rc.0 and rc.2 both
          # print 0.33.0), so read the rc-qualified version from the compiler's
          # on-disk path instead, so the zk cache key busts on an rc bump.
          target="$(readlink -f "$(command -v compactc)")"
          version="$(basename "$(dirname "$(dirname "$target")")")"
          case "$version" in [0-9]*) ;; *) version="$(compact compile --version)" ;; esac
          echo "version=$(printf '%s' "$version" | tr -cd '[:alnum:]._-')" >> "$GITHUB_OUTPUT"
      - name: Install dependencies (frozen, from the committed yarn.lock)
        run: yarn install --immutable
      - name: Compile (skip-zk)
        run: yarn compile
      - name: Restore prebuilt zk proving keys (read-only, the integration job saves)
        uses: actions/cache/restore@v4
        with:
          path: |
            packages/signet-contract/src/managed
            packages/test-caller-contract/src/managed
          key: zk-keys-${{ runner.os }}-${{ steps.compact.outputs.version }}-${{ hashFiles('packages/*/src/*.compact') }}
      - name: Ensure signet-contract prover keys (its build's publish-safety check needs them)
        run: |
          if ls packages/signet-contract/src/managed/keys/*.prover >/dev/null 2>&1; then
            echo "prover keys present (restored from the cache), skipping keygen"
          else
            yarn compile:signet-contract:zk
          fi
      - name: Build (typecheck, no emit)
        run: yarn build
      - name: Unit tests (simulator-only, the integration suites self-skip without RUN_INTEGRATION_TESTS)
        run: yarn test

  integration:
    name: integration (compose stack + fakenet + signet-caller e2e)
    if: github.event_name != 'schedule' || github.event.schedule == '17 3 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          # corepack owns yarn: the action's yarn-1 cache probe would die here
          package-manager-cache: false
      - name: Enable corepack (yarn 4 via the packageManager field)
        run: corepack enable
      - name: Restore the compact toolchain (keyed on the pinned versions)
        uses: actions/cache@v4
        with:
          path: |
            ~/.compact
            ~/.local/bin/compact
          key: compact-${{ runner.os }}-launcher0.5.1-compactc0.33.0-rc.2
      - name: Install the compact toolchain (pinned launcher + compiler, per AGENTS.md)
        run: |
          export PATH="$HOME/.local/bin:$HOME/.compact/bin:$PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.compact/bin" >> "$GITHUB_PATH"
          # Launcher pinned to compact-v0.5.1 (never releases/latest).
          if ! command -v compact >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -LsSf \
              https://github.com/midnightntwrk/compact/releases/download/compact-v0.5.1/compact-installer.sh | sh
          fi
          # compactc 0.33.0-rc.2: a ledger-9 PRERELEASE not in the launcher's
          # channel, so fetch it directly. Part of the ledger-9 matched set
          # (see docker-compose.yaml). Bump it with the npm stack.
          RC_DIR="$HOME/.compact/versions/0.33.0-rc.2/x86_64-unknown-linux-musl"
          if [ ! -x "$RC_DIR/compactc" ]; then
            mkdir -p "$RC_DIR"
            curl -fsSL -o /tmp/compactc-rc.zip \
              https://github.com/LFDT-Minokawa/compact/releases/download/compactc-v0.33.0-rc.2/compactc_v0.33.0-rc.2_x86_64-unknown-linux-musl.zip
            unzip -qo /tmp/compactc-rc.zip -d "$RC_DIR"
            chmod +x "$RC_DIR"/*
          fi
          # Adopt the on-disk version. If the launcher refuses, wire its symlinks.
          compact update 0.33.0-rc.2 || ln -sfn "$RC_DIR"/* "$HOME/.compact/bin/"
          compact compile --version
      - name: Read the compact compiler version (part of the zk cache key)
        id: compact
        run: |
          # `compact compile --version` drops the -rc suffix (rc.0 and rc.2 both
          # print 0.33.0), so read the rc-qualified version from the compiler's
          # on-disk path instead, so the zk cache key busts on an rc bump.
          target="$(readlink -f "$(command -v compactc)")"
          version="$(basename "$(dirname "$(dirname "$target")")")"
          case "$version" in [0-9]*) ;; *) version="$(compact compile --version)" ;; esac
          echo "version=$(printf '%s' "$version" | tr -cd '[:alnum:]._-')" >> "$GITHUB_OUTPUT"
      - name: Install dependencies (frozen, from the committed yarn.lock)
        run: yarn install --immutable
      - name: Compile (skip-zk)
        run: yarn compile
      - name: Restore prebuilt zk proving keys
        id: zk
        uses: actions/cache/restore@v4
        with:
          path: |
            packages/signet-contract/src/managed
            packages/test-caller-contract/src/managed
          key: zk-keys-${{ runner.os }}-${{ steps.compact.outputs.version }}-${{ hashFiles('packages/*/src/*.compact') }}
      - name: zk keygen (both contracts, cache miss only)
        if: steps.zk.outputs.cache-hit != 'true'
        run: yarn compile:zk
      - name: Save zk proving keys (immediately, before a later failure can lose them)
        if: steps.zk.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            packages/signet-contract/src/managed
            packages/test-caller-contract/src/managed
          key: zk-keys-${{ runner.os }}-${{ steps.compact.outputs.version }}-${{ hashFiles('packages/*/src/*.compact') }}
      - name: Start the local stack (midnight node, indexer, proof server, anvil)
        run: docker compose up -d
      - name: Wait for the stack
        run: |
          timeout 180 bash -c 'until curl -fsS http://127.0.0.1:9944/health >/dev/null 2>&1; do sleep 3; done'
          timeout 60 bash -c 'until curl -s -o /dev/null http://127.0.0.1:6300; do sleep 3; done'
          timeout 180 bash -c 'until curl -fs -X POST -H "content-type: application/json" -d "{\"query\":\"{__typename}\"}" http://127.0.0.1:8088/api/v3/graphql >/dev/null 2>&1; do sleep 3; done'
          curl -fsS -X POST -H 'content-type: application/json' \
            -d '{"jsonrpc":"2.0","id":1,"method":"eth_chainId","params":[]}' http://127.0.0.1:8545
      # The suite's setup deploys both contracts, writes MPC_ROOT_KEY +
      # MIDNIGHT_SIGNET_CONTRACT_ADDRESS to .env, and starts the fakenet
      # responder. The pipeline is EVM-free: anvil runs only so the responder's
      # config has a reachable EVM endpoint to boot.
      - name: Integration suite (generic signet-caller e2e)
        env:
          TRUST_PREBUILT_ZK_KEYS: "1"
        run: yarn test:integration-tests
      - name: Collect service logs
        if: failure()
        run: |
          mkdir -p ci-logs
          docker compose --profile fakenet logs --no-color > ci-logs/compose.log 2>&1 || true
          docker ps -a > ci-logs/docker-ps.txt 2>&1 || true
      - name: Upload service logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs
          path: ci-logs/
